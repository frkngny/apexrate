version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apexrate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: apex_user
      POSTGRES_PASSWORD: apex_password
      POSTGRES_DB: apexrate_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apexrate-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes # AOF to prevent data loss
    volumes:
      - redisdata:/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: apexrate-kafka
    ports:
      - "9092:9092"
    env_file:
      - ./.envs/.kafka

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: apexrate-kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'apexrate-cluster'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'

volumes:
  pgdata:
  redisdata: